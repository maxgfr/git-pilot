name: Check Program

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          additional_files: "script.sh"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Make script executable
        run: chmod +x script.sh

      # ── Basic commands ──

      - name: "Test: --version"
        run: |
          output=$(./script.sh --version)
          echo "$output"
          [[ "$output" == git-pilot\ v* ]] || { echo "FAIL: version format"; exit 1; }

      - name: "Test: --help shows usage"
        run: |
          output=$(./script.sh --help 2>&1)
          echo "$output" | grep -q "Usage:" || { echo "FAIL: missing Usage"; exit 1; }
          echo "$output" | grep -q "commit" || { echo "FAIL: missing commit command"; exit 1; }
          echo "$output" | grep -q "resolve" || { echo "FAIL: missing resolve command"; exit 1; }
          echo "$output" | grep -q "rebase" || { echo "FAIL: missing rebase command"; exit 1; }
          echo "$output" | grep -q "setup" || { echo "FAIL: missing setup command"; exit 1; }
          echo "$output" | grep -q "config" || { echo "FAIL: missing config command"; exit 1; }
          echo "$output" | grep -q "\-P" || { echo "FAIL: missing -P alias"; exit 1; }

      # ── Config command ──

      - name: "Test: config without config file"
        run: |
          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          output=$(./script.sh config 2>&1)
          echo "$output"
          echo "$output" | grep -q "Provider:" || { echo "FAIL: missing Provider"; exit 1; }
          echo "$output" | grep -q "claude-code" || { echo "FAIL: default provider should be claude-code"; exit 1; }
          echo "$output" | grep -q "Skip confirm:.*false" || { echo "FAIL: skip_confirm should default to false"; exit 1; }
          echo "$output" | grep -q "not created yet" || { echo "FAIL: should say config not created"; exit 1; }

      - name: "Test: config with existing config file"
        run: |
          CFG_DIR="$(mktemp -d)"
          export GIT_PILOT_CONFIG_DIR="$CFG_DIR"
          mkdir -p "$CFG_DIR"
          printf 'provider=anthropic\nmodel=claude-haiku-4-5\napi_key=sk-ant-test1234567890abcdefghij\nauto_stage=true\nauto_push=false\nconventional=true\nemoji=false\nskip_confirm=true\nlanguage=fr\n' > "$CFG_DIR/config"
          output=$(./script.sh config 2>&1)
          echo "$output"
          echo "$output" | grep -q "anthropic" || { echo "FAIL: provider not loaded"; exit 1; }
          echo "$output" | grep -q "claude-haiku-4-5" || { echo "FAIL: model not loaded"; exit 1; }
          echo "$output" | grep -q "sk-ant-t" || { echo "FAIL: masked API key not shown"; exit 1; }
          echo "$output" | grep -q "exists" || { echo "FAIL: should say config exists"; exit 1; }
          echo "$output" | grep -q "Skip confirm:.*true" || { echo "FAIL: skip_confirm not loaded"; exit 1; }

      - name: "Test: config file without trailing newline reads all values"
        run: |
          CFG_DIR="$(mktemp -d)"
          export GIT_PILOT_CONFIG_DIR="$CFG_DIR"
          mkdir -p "$CFG_DIR"
          # printf without trailing \n to simulate a file with no final newline
          printf 'provider=claude-code\nauto_stage=true\nskip_confirm=true' > "$CFG_DIR/config"
          output=$(./script.sh config 2>&1)
          echo "$output"
          echo "$output" | grep -q "Skip confirm:.*true" || { echo "FAIL: last line without newline not read"; exit 1; }
          echo "$output" | grep -q "Auto-stage:.*true" || { echo "FAIL: auto_stage not loaded"; exit 1; }

      - name: "Test: spinner writes to stderr and starts inside subshell"
        run: |
          # Verify the spinner TTY check uses fd 2 (stderr), not fd 1 (stdout)
          grep -q '\[ ! -t 2 \]' ./script.sh || { echo "FAIL: spinner should check stderr (fd 2) for TTY"; exit 1; }

      # ── Error handling ──

      - name: "Test: unknown argument exits with error"
        run: |
          if ./script.sh --fakeflag 2>&1; then
            echo "FAIL: should have exited with error"
            exit 1
          fi

      - name: "Test: not a git repo exits with error"
        run: |
          cd "$(mktemp -d)"
          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          if "$GITHUB_WORKSPACE/script.sh" 2>&1; then
            echo "FAIL: should have exited with error"
            exit 1
          fi
          output=$("$GITHUB_WORKSPACE/script.sh" 2>&1 || true)
          echo "$output" | grep -qi "not inside a git repository" || { echo "FAIL: wrong error message"; exit 1; }

      - name: "Test: no staged changes exits with error"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # Use API provider to avoid requiring claude CLI
          if "$GITHUB_WORKSPACE/script.sh" -p anthropic --api-key "fake" 2>&1; then
            echo "FAIL: should have exited with error"
            exit 1
          fi
          output=$("$GITHUB_WORKSPACE/script.sh" -p anthropic --api-key "fake" 2>&1 || true)
          echo "$output" | grep -qi "no staged changes" || { echo "FAIL: wrong error message"; exit 1; }

      - name: "Test: API provider without API key exits with error"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"
          echo "change" >> init.txt && git add init.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          for provider in anthropic openai gemini mistral; do
            if "$GITHUB_WORKSPACE/script.sh" -p "$provider" 2>&1; then
              echo "FAIL: $provider should fail without API key"
              exit 1
            fi
            output=$("$GITHUB_WORKSPACE/script.sh" -p "$provider" 2>&1 || true)
            echo "$output" | grep -qi "no api key" || { echo "FAIL: $provider wrong error"; exit 1; }
          done

      - name: "Test: API provider with bad API key returns error"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"
          echo "change" >> init.txt && git add init.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # Anthropic with a fake key — should get an API error (not crash)
          output=$("$GITHUB_WORKSPACE/script.sh" -p anthropic --api-key "sk-fake-key" 2>&1 || true)
          echo "$output"
          # Should mention an error (401 or connection error), not crash
          echo "$output" | grep -qi "error" || { echo "FAIL: should show API error"; exit 1; }

      # ── CLI provider missing ──

      - name: "Test: claude-code provider fails gracefully without CLI"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"
          echo "change" >> init.txt && git add init.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # claude CLI is not installed in CI — should fail gracefully
          output=$("$GITHUB_WORKSPACE/script.sh" -p claude-code 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qi "claude\|not found\|not installed\|command" || { echo "FAIL: should mention claude"; exit 1; }

      - name: "Test: codex provider fails gracefully without CLI"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"
          echo "change" >> init.txt && git add init.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          output=$("$GITHUB_WORKSPACE/script.sh" -p codex 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qi "codex\|not found\|not installed\|command" || { echo "FAIL: should mention codex"; exit 1; }

      # ── Flag combinations ──

      - name: "Test: --auto-stage stages all changes"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"

          # Create unstaged changes
          echo "new content" > unstaged.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # With -a flag + fake API provider (will fail at API call, but staging should happen)
          output=$("$GITHUB_WORKSPACE/script.sh" -a -p anthropic --api-key "fake" 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qi "staged all changes" || { echo "FAIL: should auto-stage"; exit 1; }

      - name: "Test: --dry-run does not create a commit"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"
          BEFORE=$(git rev-parse HEAD)

          echo "change" >> init.txt && git add init.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # Use anthropic with a bad key — AI call will fail, but we check dry-run stops before commit
          # Actually we need an AI response for dry-run to display. Just verify the flag is parsed.
          "$GITHUB_WORKSPACE/script.sh" -d -p anthropic --api-key "fake" 2>&1 || true

          AFTER=$(git rev-parse HEAD)
          [[ "$BEFORE" == "$AFTER" ]] || { echo "FAIL: dry-run should not create a commit"; exit 1; }

      # ── Resolve with no conflicts ──

      - name: "Test: resolve with no conflicts"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # Use API provider to avoid requiring claude CLI
          output=$("$GITHUB_WORKSPACE/script.sh" resolve -p anthropic --api-key "fake" 2>&1)
          echo "$output"
          echo "$output" | grep -qi "no merge conflicts" || { echo "FAIL: should say no conflicts"; exit 1; }

      # ── Conflict marker detection ──

      - name: "Test: conflict markers block commit"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"

          # Create a file with conflict markers and stage it
          cat > conflict.txt << 'MARKERS'
          some code
          <<<<<<< HEAD
          current version
          ||||||| abc1234
          original version
          =======
          incoming version
          >>>>>>> feature-branch
          more code
          MARKERS
          git add conflict.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # Feed "4" (Cancel) to prompt_select so it exits
          output=$(echo "4" | "$GITHUB_WORKSPACE/script.sh" -p anthropic --api-key "fake" 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qi "unresolved merge conflicts" || { echo "FAIL: should detect conflict markers"; exit 1; }
          echo "$output" | grep -qi "conflict.txt" || { echo "FAIL: should list conflicted file"; exit 1; }

      - name: "Test: accept current resolves conflicts (ours)"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          echo "base" > file.txt && git add file.txt && git commit -m "init"

          # Write conflict markers
          printf 'before\n<<<<<<< HEAD\ncurrent line\n||||||| abc1234\noriginal line\n=======\nincoming line\n>>>>>>> branch\nafter\n' > file.txt
          git add file.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # Feed "1" (Accept current) then the rest will fail at AI call — but file should be resolved
          echo "1" | "$GITHUB_WORKSPACE/script.sh" -p anthropic --api-key "fake" 2>&1 || true
          content=$(cat file.txt)
          echo "Resolved content: $content"
          echo "$content" | grep -q "current line" || { echo "FAIL: should keep current"; exit 1; }
          echo "$content" | grep -q "incoming line" && { echo "FAIL: should NOT keep incoming"; exit 1; } || true
          echo "$content" | grep -q "<<<<<<<" && { echo "FAIL: markers should be removed"; exit 1; } || true

      - name: "Test: accept incoming resolves conflicts (theirs)"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          echo "base" > file.txt && git add file.txt && git commit -m "init"

          # Write conflict markers
          printf 'before\n<<<<<<< HEAD\ncurrent line\n=======\nincoming line\n>>>>>>> branch\nafter\n' > file.txt
          git add file.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # Feed "2" (Accept incoming)
          echo "2" | "$GITHUB_WORKSPACE/script.sh" -p anthropic --api-key "fake" 2>&1 || true
          content=$(cat file.txt)
          echo "Resolved content: $content"
          echo "$content" | grep -q "incoming line" || { echo "FAIL: should keep incoming"; exit 1; }
          echo "$content" | grep -q "current line" && { echo "FAIL: should NOT keep current"; exit 1; } || true
          echo "$content" | grep -q "<<<<<<<" && { echo "FAIL: markers should be removed"; exit 1; } || true

      - name: "Test: no conflict markers proceeds normally"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"
          echo "clean change" >> init.txt && git add init.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # Should NOT mention conflicts (will fail at API call, but that's fine)
          output=$("$GITHUB_WORKSPACE/script.sh" -p anthropic --api-key "fake" 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qi "unresolved merge conflicts" && { echo "FAIL: should not detect conflicts on clean files"; exit 1; } || true

      # ── Config file permissions ──

      - name: "Test: config file created with secure permissions"
        run: |
          CFG_DIR="$(mktemp -d)"
          export GIT_PILOT_CONFIG_DIR="$CFG_DIR"

          # Simulate setup by writing a config manually and checking the script reads it
          mkdir -p "$CFG_DIR"
          echo "provider=openai" > "$CFG_DIR/config"
          chmod 600 "$CFG_DIR/config"

          perms=$(stat -c %a "$CFG_DIR/config")
          [[ "$perms" == "600" ]] || { echo "FAIL: config should be 600, got $perms"; exit 1; }

      # ── Argument parsing edge cases ──

      - name: "Test: subcommand aliases"
        run: |
          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # --setup, --resolve, --rebase should be recognized as action aliases
          # They need a git repo for resolve/rebase, but setup doesn't
          # Just test that --setup doesn't error out immediately (it will wait for input, so use timeout)
          timeout 2 "$GITHUB_WORKSPACE/script.sh" --setup </dev/null 2>&1 || true

      - name: "Test: combined short flags"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"
          echo "x" >> init.txt && git add init.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # -d -c -e -a should all be parsed (will fail at AI call since no provider)
          output=$("$GITHUB_WORKSPACE/script.sh" -d -c -e -a -p anthropic --api-key "fake" 2>&1 || true)
          echo "$output"
          # Should have gotten past arg parsing (staged all changes with -a)
          echo "$output" | grep -qi "staged all changes" || { echo "FAIL: flags not parsed"; exit 1; }

      - name: "Test: -l flag sets language"
        run: |
          cd "$(mktemp -d)"
          git init
          git config user.email "test@test.com"
          git config user.name "Test"
          touch init.txt && git add init.txt && git commit -m "init"
          echo "x" >> init.txt && git add init.txt

          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"
          # -l fr should be accepted without error
          output=$("$GITHUB_WORKSPACE/script.sh" -d -l fr -p anthropic --api-key "fake" 2>&1 || true)
          echo "$output"
          # Should have gotten past arg parsing
          echo "$output" | grep -qi "error.*unknown\|unknown.*argument" && { echo "FAIL: -l fr rejected"; exit 1; } || true

      # ── Default model per provider ──

      - name: "Test: default models are set correctly"
        run: |
          export GIT_PILOT_CONFIG_DIR="$(mktemp -d)"

          for pair in "claude-code:haiku" "codex:gpt-5-mini" "anthropic:claude-haiku-4-5" "openai:gpt-5-mini" "gemini:gemini-2.5-flash-lite" "mistral:mistral-small-latest"; do
            provider="${pair%%:*}"
            expected_model="${pair##*:}"
            echo "provider=$provider" > "$GIT_PILOT_CONFIG_DIR/config"
            output=$(./script.sh config 2>&1)
            echo "Provider: $provider -> $(echo "$output" | grep "Model:")"
            echo "$output" | grep -q "$expected_model" || { echo "FAIL: $provider default model should be $expected_model"; exit 1; }
          done
